<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0">{{ esEdicion ? 'Editar' : 'Registrar' }} Proveedor</h4>
      </div>
      <div class="card-body">
        <form (ngSubmit)="guardarProveedor()" #proveedorForm="ngForm">
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">RUC</label>
              <input type="text" class="form-control" name="ruc" [(ngModel)]="proveedor.ruc" required maxlength="11" minlength="11">
            </div>
            <div class="col-md-6">
              <label class="form-label">Razón Social</label>
              <input type="text" class="form-control" name="razonSocial" [(ngModel)]="proveedor.razonSocial" required>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Teléfono</label>
              <input type="text" class="form-control" name="telefono" [(ngModel)]="proveedor.telefono">
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" name="email" [(ngModel)]="proveedor.email">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Dirección</label>
            <input type="text" class="form-control" name="direccion" [(ngModel)]="proveedor.direccion">
          </div>

          <div class="d-flex justify-content-end gap-2 mt-4">
            <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
            <button type="submit" class="btn btn-primary" [disabled]="!proveedorForm.form.valid">
              {{ esEdicion ? 'Actualizar' : 'Registrar' }} Proveedor
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
