<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h3 class="mb-0">{{ esEdicion ? 'Modificar Proveedor' : 'Registrar Nuevo Proveedor' }}</h3>
        </div>
        <div class="card-body">
          <form (ngSubmit)="guardarProveedor()">
            
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">RUC *</label>
                <input type="text" class="form-control" [(ngModel)]="proveedor.ruc" name="ruc" maxlength="11" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Razón Social *</label>
                <input type="text" class="form-control" [(ngModel)]="proveedor.razonSocial" name="razonSocial" required>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Teléfono de Contacto</label>
                <input type="text" class="form-control" [(ngModel)]="proveedor.telefono" name="telefono">
              </div>
              <div class="col-md-6">
                <label class="form-label">Correo Electrónico (Email)</label>
                <input type="email" class="form-control" [(ngModel)]="proveedor.email" name="email">
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label">Dirección Fiscal</label>
              <input type="text" class="form-control" [(ngModel)]="proveedor.direccion" name="direccion">
            </div>

            <div class="d-flex justify-content-end">
              <button type="button" class="btn btn-secondary me-2" routerLink="/proveedores">Cancelar</button>
              <button type="submit" class="btn btn-primary">
                {{ esEdicion ? 'Guardar Cambios' : 'Registrar Proveedor' }}
              </button>
            </div>
            
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
