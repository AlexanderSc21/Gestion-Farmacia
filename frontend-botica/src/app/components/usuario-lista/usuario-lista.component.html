<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Personal de la Botica</h2>
    <button class="btn btn-primary" routerLink="/registro">
      + Registrar Nuevo
    </button>
  </div>

  <table class="table table-striped table-bordered shadow">
    <thead class="table-dark">
      <tr>
        <th>Nombre</th>
        <th>Correo</th>
        <th>Rol</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let u of usuarios">
        <td>{{ u.nombre_completo }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.rol?.nombre }}</td>
        <td>
          <span class="badge bg-success" *ngIf="u.activo">Activo</span>
          <span class="badge bg-danger" *ngIf="!u.activo">Inactivo</span>
        </td>
        <td>
          <button class="btn btn-sm btn-warning me-2" [routerLink]="['/editar', u.usuario_id]">Editar</button>
          <button *ngIf="u.activo" class="btn btn-sm btn-danger" (click)="darDeBaja(u.usuario_id)" >Dar de Baja</button>
          <button *ngIf="!u.activo" class="btn btn-sm btn-success" (click)="activar(u.usuario_id)">Activar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
