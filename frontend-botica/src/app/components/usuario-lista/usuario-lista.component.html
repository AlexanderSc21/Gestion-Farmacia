<div class="card shadow">
  <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
    <h4 class="mb-0">Gestión de Usuarios / Personal</h4>
    <button type="button" class="btn btn-light btn-sm" (click)="nuevoUsuario()">
      <i class="bi bi-person-plus"></i> Nuevo Usuario
    </button>
  </div>
  <div class="card-body">
    <div class="mb-4" *ngIf="mostrarFormulario">
      <app-registro
        [embedded]="true"
        [usuarioId]="usuarioEditId"
        (saved)="onUsuarioGuardado()"
        (cancelled)="cerrarFormulario()"
      ></app-registro>
    </div>
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Nombre Completo</th>
            <th>Email</th>
            <th>Rol</th>
            <th>Estado</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let u of usuarios">
            <td>{{ u.usuario_id }}</td>
            <td><strong>{{ u.nombre_completo }}</strong></td>
            <td>{{ u.email }}</td>
            <td><span class="badge bg-info text-dark">{{ u.rol?.nombre || 'N/A' }}</span></td>
            <td>
              <span class="badge" [ngClass]="u.activo ? 'bg-success' : 'bg-danger'">
                {{ u.activo ? 'Activo' : 'Baja' }}
              </span>
            </td>
            <td class="text-center">
              <div class="btn-group btn-group-sm">
                <button type="button" (click)="editarUsuario(u.usuario_id!)" class="btn btn-outline-warning" title="Editar">
                  <i class="bi bi-pencil"></i>
                </button>
                <button *ngIf="u.activo" (click)="darDeBaja(u.usuario_id!)" class="btn btn-outline-danger" title="Desactivar">
                  <i class="bi bi-person-dash"></i>
                </button>
                <button *ngIf="!u.activo" (click)="activar(u.usuario_id!)" class="btn btn-outline-success" title="Activar">
                  <i class="bi bi-person-check"></i>
                </button>
              </div>
            </td>
          </tr>
          <tr *ngIf="usuarios.length === 0">
            <td colspan="6" class="text-center py-4">No se encontraron usuarios registrados.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
