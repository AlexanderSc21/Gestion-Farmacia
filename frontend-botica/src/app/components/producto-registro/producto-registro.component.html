<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0">{{ esEdicion ? 'Editar' : 'Registrar' }} Producto</h4>
      </div>
      <div class="card-body">
        <form (ngSubmit)="registrarProducto()" #productoForm="ngForm">
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Nombre Comercial</label>
              <input type="text" class="form-control" name="nombreComercial" [(ngModel)]="producto.nombreComercial" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Nombre Genérico</label>
              <input type="text" class="form-control" name="nombreGenerico" [(ngModel)]="producto.nombreGenerico" required>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Presentación</label>
              <input type="text" class="form-control" name="presentacion" [(ngModel)]="producto.presentacion" placeholder="Ej: Tabletas 500mg" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Categoría</label>
              <select class="form-select" name="categoria" [(ngModel)]="producto.categoria!.categoria_id" required>
                <option [ngValue]="undefined" disabled>Seleccione una categoría</option>
                <option *ngFor="let cat of categorias" [value]="cat.categoria_id">{{ cat.nombre }}</option>
              </select>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Precio Venta Unitario</label>
              <div class="input-group">
                <span class="input-group-text">S/</span>
                <input type="number" step="0.01" class="form-control" name="precioVentaUnitario" [(ngModel)]="producto.precioVentaUnitario" required>
              </div>
            </div>
            <div class="col-md-6">
              <label class="form-label">Stock Mínimo</label>
              <input type="number" class="form-control" name="stockMinimo" [(ngModel)]="producto.stockMinimo" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">URL de Imagen</label>
            <input type="text" class="form-control" name="imagenUrl" [(ngModel)]="producto.imagenUrl" placeholder="https://ejemplo.com/imagen.jpg">
          </div>

          <div class="d-flex justify-content-end gap-2 mt-4">
            <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
            <button type="submit" class="btn btn-primary" [disabled]="!productoForm.form.valid">
              {{ esEdicion ? 'Actualizar' : 'Registrar' }} Producto
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
