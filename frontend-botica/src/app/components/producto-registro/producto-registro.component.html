<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow">
        <div class="card-header bg-success text-white">
          <h3 class="mb-0">{{ esEdicion ? 'Editar Medicamento' : 'Registrar Nuevo Medicamento' }}</h3>
        </div>
        <div class="card-body">
          <form (ngSubmit)="registrarProducto()">
            
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Nombre Comercial *</label>
                <input type="text" class="form-control" [(ngModel)]="producto.nombreComercial" name="nombreComercial" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Nombre Genérico</label>
                <input type="text" class="form-control" [(ngModel)]="producto.nombreGenerico" name="nombreGenerico">
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Presentación *</label>
                <input type="text" class="form-control" placeholder="Ej: Tableta, Jarabe, Gotas" [(ngModel)]="producto.presentacion" name="presentacion" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Categoría *</label>
                <select class="form-select" [(ngModel)]="producto.categoria.categoria_id" name="categoria" required>
                  <option [ngValue]="null" disabled>Seleccione una categoría</option>
                  <option *ngFor="let cat of categorias" [ngValue]="cat.categoria_id">
                    {{ cat.nombre }}
                  </option>
                </select>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Precio Unitario (S/.) *</label>
                <input type="number" step="0.01" class="form-control" [(ngModel)]="producto.precioVentaUnitario" name="precioVentaUnitario" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Stock Mínimo</label>
                <input type="number" class="form-control" [(ngModel)]="producto.stockMinimo" name="stockMinimo">
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label">URL de la Imagen (Opcional)</label>
              <input type="text" class="form-control" placeholder="https://ejemplo.com/imagen.jpg" [(ngModel)]="producto.imagenUrl" name="imagenUrl">
            </div>

            <div class="d-flex justify-content-end">
              <button type="button" class="btn btn-secondary me-2" routerLink="/productos">Cancelar</button>
              <button type="submit" class="btn btn-success"> {{ esEdicion ? 'Guardar Cambios' : 'Guardar Medicamento' }}</button>
            </div>
            
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
