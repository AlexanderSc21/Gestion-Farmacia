<div class="card shadow">
  <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center flex-wrap gap-2">
    <h4 class="mb-0">Gestión de Proveedores</h4>
    <button type="button" class="btn btn-light btn-sm header-action" (click)="nuevoProveedor()">
      <i class="bi bi-plus-circle"></i> Nuevo Proveedor
    </button>
  </div>
  <div class="card-body">
    <div class="mb-4" *ngIf="mostrarFormulario">
      <app-proveedor-registro
        [embedded]="true"
        [proveedorId]="proveedorEditId"
        (saved)="onProveedorGuardado()"
        (cancelled)="cerrarFormulario()"
      ></app-proveedor-registro>
    </div>
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>RUC</th>
            <th>Razón Social</th>
            <th>Teléfono</th>
            <th>Email</th>
            <th>Estado</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let p of proveedores">
            <td>{{ p.proveedor_id }}</td>
            <td>{{ p.ruc }}</td>
            <td><strong>{{ p.razonSocial }}</strong></td>
            <td>{{ p.telefono || 'N/A' }}</td>
            <td>{{ p.email || 'N/A' }}</td>
            <td>
              <span class="badge" [ngClass]="p.activo ? 'bg-success' : 'bg-danger'">
                {{ p.activo ? 'Activo' : 'Inactivo' }}
              </span>
            </td>
            <td class="text-center">
              <div class="btn-group btn-group-sm">
                <button type="button" (click)="editarProveedor(p.proveedor_id!)" class="btn btn-outline-warning" title="Editar">
                  <i class="bi bi-pencil"></i>
                </button>
                <button *ngIf="p.activo" (click)="darDeBaja(p.proveedor_id!)" class="btn btn-outline-danger" title="Desactivar">
                  <i class="bi bi-x-circle"></i>
                </button>
                <button *ngIf="!p.activo" (click)="activar(p.proveedor_id!)" class="btn btn-outline-success" title="Activar">
                  <i class="bi bi-check-circle"></i>
                </button>
              </div>
            </td>
          </tr>
          <tr *ngIf="proveedores.length === 0">
            <td colspan="7" class="text-center py-4">No se encontraron proveedores.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
