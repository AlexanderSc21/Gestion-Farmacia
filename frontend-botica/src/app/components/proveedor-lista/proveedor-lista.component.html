<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Directorio de Proveedores</h2>
    <button class="btn btn-primary" routerLink="/proveedores/nuevo">+ Registrar Proveedor</button>
  </div>

  <div class="table-responsive shadow rounded">
    <table class="table table-striped table-hover align-middle mb-0">
      <thead class="table-dark">
        <tr>
          <th>RUC</th>
          <th>Razón Social</th>
          <th>Teléfono</th>
          <th>Email</th>
          <th>Dirección</th>
          <th class="text-center">Estado</th>
          <th class="text-center">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngIf="proveedores.length === 0">
          <td colspan="7" class="text-center text-muted py-4">
            No hay proveedores registrados en el sistema.
          </td>
        </tr>

        <tr *ngFor="let prov of proveedores">
          <td><strong>{{ prov.ruc }}</strong></td>
          <td>{{ prov.razonSocial }}</td>
          <td>{{ prov.telefono || 'N/A' }}</td>
          <td>{{ prov.email || 'N/A' }}</td>
          <td>{{ prov.direccion || 'N/A' }}</td>
          <td class="text-center">
            <span class="badge" [ngClass]="prov.activo ? 'bg-success' : 'bg-danger'">
              {{ prov.activo ? 'Activo' : 'Inactivo' }}
            </span>
          </td>
          <td class="text-center">
            <button class="btn btn-sm btn-warning me-2" [routerLink]="['/proveedores/editar', prov.proveedor_id]">Editar</button>

            <button *ngIf="prov.activo" class="btn btn-sm btn-danger" (click)="darDeBaja(prov.proveedor_id)">
              Dar de Baja
            </button>
            <button *ngIf="!prov.activo" class="btn btn-sm btn-success" (click)="activar(prov.proveedor_id)">
              Activar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
