<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0">{{ esEdicion ? 'Editar' : 'Registrar' }} Usuario</h4>
      </div>
      <div class="card-body">
        <form (ngSubmit)="registrar()" #userForm="ngForm">
          <div class="mb-3">
            <label class="form-label">Nombre Completo</label>
            <input type="text" class="form-control" name="nombre_completo" [(ngModel)]="usuario.nombre_completo" required>
          </div>
          
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" [(ngModel)]="usuario.email" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Contraseña {{ esEdicion ? '(Opcional si no desea cambiar)' : '' }}</label>
            <input type="password" class="form-control" name="password_hash" [(ngModel)]="usuario.password_hash" [required]="!esEdicion">
          </div>

          <div class="mb-3">
            <label class="form-label">Rol</label>
            <select class="form-select" name="rol" [(ngModel)]="usuario.rol!.rol_id" required>
              <option [value]="1">Administrador</option>
              <option [value]="2">Vendedor</option>
              <option [value]="3">Almacenero</option>
            </select>
          </div>

          <div class="d-flex justify-content-end gap-2 mt-4">
            <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
            <button type="submit" class="btn btn-primary" [disabled]="!userForm.form.valid">
              {{ esEdicion ? 'Actualizar' : 'Registrar' }} Usuario
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
