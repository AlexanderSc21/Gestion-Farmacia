<div class="row">
  <div class="col-md-4">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">Nueva Categoría</h5>
      </div>
      <div class="card-body">
        <form (ngSubmit)="registrar()">
          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" name="nombre" [(ngModel)]="nuevaCategoria.nombre" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea class="form-control" name="descripcion" [(ngModel)]="nuevaCategoria.descripcion" rows="3"></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-100">Registrar</button>
        </form>
      </div>
    </div>
  </div>
  <div class="col-md-8">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">Lista de Categorías</h5>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <div class="list-group list-group-flush category-list">
            <div class="list-group-item d-flex align-items-center justify-content-between gap-3 py-3" *ngFor="let cat of categorias">
              <span class="category-pill">{{ cat.nombre }}</span>
              <span class="text-muted small flex-grow-1 text-truncate">{{ cat.descripcion || '—' }}</span>
              <span class="text-muted small">#{{ cat.categoria_id }}</span>
            </div>
            <div class="list-group-item text-center text-muted py-4" *ngIf="categorias.length === 0">
              No hay categorías registradas.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
